<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>arXiv 自动驾驶论文</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>arXiv 自动驾驶论文</h1>
          <p id="statusText">读取状态中...</p>
        </div>
        <button id="runButton" type="button">更新论文</button>
      </header>

      <section class="toolbar" aria-label="表格筛选">
        <label>
          搜索
          <input id="searchInput" type="search" placeholder="标题、摘要、关键词">
        </label>
        <label>
          主题
          <select id="topicFilter">
            <option value="">全部主题</option>
          </select>
        </label>
        <label>
          arXiv 分类
          <select id="categoryFilter">
            <option value="">全部分类</option>
          </select>
        </label>
        <label>
          排序
          <select id="sortSelect">
            <option value="desc">发布日期：新到旧</option>
            <option value="asc">发布日期：旧到新</option>
          </select>
        </label>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>标题</th>
              <th>信息</th>
              <th>关键词</th>
              <th>摘要</th>
              <th>简短总结</th>
            </tr>
          </thead>
          <tbody id="paperRows"></tbody>
        </table>
        <div id="emptyState" class="empty" hidden>还没有本地论文表格，请点击“更新论文”。</div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
